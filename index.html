<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
            <title>Reklam Avcısı Kedi v3</title>
                <style>
                        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
                                canvas { display: block; }
                                        #ui { position: absolute; top: 20px; left: 20px; color: #0f0; font-size: 20px; font-weight: bold; pointer-events: none; }
                                                
                                                        /* Ekrandaki tatlı kedi animasyonu */
                                                                #specialCat {
                                                                            position: absolute;
                                                                                        bottom: -300px; /* Başta gizli */
                                                                                                    left: 50%;
                                                                                                                transform: translateX(-50%);
                                                                                                                            width: 250px;
                                                                                                                                        transition: bottom 0.5s ease-out;
                                                                                                                                                    pointer-events: none;
                                                                                                                                                                z-index: 100;
                                                                                                                                                                        }
                                                                                                                                                                                #meowText {
                                                                                                                                                                                            position: absolute;
                                                                                                                                                                                                        top: 40%;
                                                                                                                                                                                                                    left: 50%;
                                                                                                                                                                                                                                transform: translate(-50%, -50%);
                                                                                                                                                                                                                                            font-size: 80px;
                                                                                                                                                                                                                                                        color: #ff69b4;
                                                                                                                                                                                                                                                                    font-weight: bold;
                                                                                                                                                                                                                                                                                display: none;
                                                                                                                                                                                                                                                                                            text-shadow: 0 0 20px white;
                                                                                                                                                                                                                                                                                                        z-index: 101;
                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                    </style>
                                                                                                                                                                                                                                                                                                                    </head>
                                                                                                                                                                                                                                                                                                                    <body>
                                                                                                                                                                                                                                                                                                                        <div id="ui">REKLAM SİLİNDİ: 0 | <span style="color:pink">ÖZEL GÜÇ İÇİN EKRANA ÇİFT TIKLA!</span></div>
                                                                                                                                                                                                                                                                                                                            <div id="meowText">MİYAV! 🐾</div>
                                                                                                                                                                                                                                                                                                                                <img id="specialCat" src="https://placekitten.com/300/300" alt="Special Cat">
                                                                                                                                                                                                                                                                                                                                    <canvas id="gameCanvas"></canvas>

                                                                                                                                                                                                                                                                                                                                        <script>
                                                                                                                                                                                                                                                                                                                                                const canvas = document.getElementById('gameCanvas');
                                                                                                                                                                                                                                                                                                                                                        const ctx = canvas.getContext('2d');
                                                                                                                                                                                                                                                                                                                                                                const specialCat = document.getElementById('specialCat');
                                                                                                                                                                                                                                                                                                                                                                        const meowText = document.getElementById('meowText');

                                                                                                                                                                                                                                                                                                                                                                                canvas.width = window.innerWidth;
                                                                                                                                                                                                                                                                                                                                                                                        canvas.height = window.innerHeight;

                                                                                                                                                                                                                                                                                                                                                                                                let score = 0;
                                                                                                                                                                                                                                                                                                                                                                                                        let enemies = [];
                                                                                                                                                                                                                                                                                                                                                                                                                let isSpecialActive = false;

                                                                                                                                                                                                                                                                                                                                                                                                                        // ÇİFT TIKLAMA İLE KEDİ ÇIKAR
                                                                                                                                                                                                                                                                                                                                                                                                                                window.addEventListener('dblclick', activateSpecialPower);
                                                                                                                                                                                                                                                                                                                                                                                                                                        window.addEventListener('touchstart', (e) => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (e.touches.length > 1) activateSpecialPower(); // Mobilde iki parmakla dokunma
                                                                                                                                                                                                                                                                                                                                                                                                                                                            });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                    function activateSpecialPower() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if (isSpecialActive) return;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            isSpecialActive = true;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // Kediyi ekrana sür
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    specialCat.style.bottom = "0px";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                meowText.style.display = "block";

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // Tüm reklamları (düşmanları) sil!
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        setTimeout(() => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        enemies = [];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        score += 50;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // Kediyi geri gönder
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        setTimeout(() => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            specialCat.style.bottom = "-300px";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                meowText.style.display = "none";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    isSpecialActive = false;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }, 1000);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }, 500);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function createEnemy() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if (Math.random() < 0.05 && !isSpecialActive) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            enemies.push({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                x: Math.random() * (canvas.width - 120),
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    y: -50,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        w: 120,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            h: 50,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                text: "REKLAM #" + Math.floor(Math.random() * 100),
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    speed: 2 + (score / 500)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function update() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            enemies.forEach((en, i) => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            en.y += en.speed;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if (en.y > canvas.height) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                enemies.splice(i, 1);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    score++;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            createEnemy();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            function draw() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ctx.fillStyle = "#111";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // Reklamları çiz
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            enemies.forEach(en => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            ctx.fillStyle = "red";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            ctx.fillRect(en.x, en.y, en.w, en.h);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            ctx.fillStyle = "white";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            ctx.font = "14px Arial";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            ctx.fillText(en.text, en.x + 10, en.y + 30);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    requestAnimationFrame(() => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    update();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    draw();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('ui').innerHTML = `REKLAM SİLİNDİ: ${score} | <span style="color:pink">ÖZEL GÜÇ İÇİN ÇİFT TIKLA!</span>`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                draw();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </html>
